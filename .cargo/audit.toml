[advisories]
ignore = [
    # rsa: Marvin Attack (PKCS#1v1.5 decryption timing side-channel).
    # Not exploitable here: the rsa crate is only used for public key parsing,
    # signature verification, and CRT parameter derivation for key import.
    # All RSA private key decryption happens on the YubiKey hardware.
    "RUSTSEC-2023-0071",
] # advisory IDs to ignore e.g. ["RUSTSEC-2019-0001", ...]
